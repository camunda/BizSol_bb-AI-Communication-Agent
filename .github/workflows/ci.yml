name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: CPT Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run CPT tests
        run: mvn --batch-mode verify
